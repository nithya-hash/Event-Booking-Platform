name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - name: Typecheck and build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

  # Deployment is handled by Vercel, which is connected directly to this
  # GitHub repo and auto-builds/redeploys the frontend on every push to
  # main. No Docker Hub push or deploy-hook secrets needed here. See
  # README for the Vercel setup steps.
