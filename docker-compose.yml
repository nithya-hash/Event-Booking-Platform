services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone
      POSTGRES_DB: capstone_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstone -d capstone_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Overrides the .env value: inside Docker's network, Postgres is
      # reachable at hostname "db" (the service name), not "localhost".
      DATABASE_URL: postgresql://capstone:capstone@db:5432/capstone_db
      # Force production mode regardless of what NODE_ENV is set to in
      # .env - otherwise the logger tries to load pino-pretty, which is
      # a devDependency deliberately excluded from the production image.
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        # Browser JS runs on the host machine, not inside Docker's
        # network, so it must reach the backend via localhost:4000
        # (the port mapped above), not the "backend" service hostname.
        VITE_API_URL: http://localhost:4000/api/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  db_data:
