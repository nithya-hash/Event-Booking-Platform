version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: capstone_db
    restart: always
    environment:
      POSTGRES_USER: capstone
      POSTGRES_PASSWORD: capstone
      POSTGRES_DB: capstone_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capstone -d capstone_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: capstone_backend
    build:
      context: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://capstone:capstone@db:5432/capstone_db
      DOCKER: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

    # ✅ Production run (FIXED)
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    container_name: capstone_frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api/v1
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  db_data: