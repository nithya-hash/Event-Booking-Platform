server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip common text assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Cache hashed static assets aggressively
    location ~* \.(js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # react-router uses client-side routing, so any path that isn't a
    # real file (e.g. /events/123) must fall back to index.html and let
    # the SPA's router handle it - otherwise a page refresh 404s.
    location / {
        try_files $uri /index.html;
    }
}
